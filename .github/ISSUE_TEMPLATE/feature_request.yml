---
name: Feature Request
description: Suggest a new feature or enhancement
title: '[Feature]: '
labels: ['enhancement', 'triage']
assignees: []
body:
  - type: markdown
    attributes:
      value: |
        Describe the problem and proposed solution for GoldOS.
  - type: textarea
    id: problem
    attributes:
      label: Problem Statement
      description: What problem does this solve?
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: How should GoldOS address this?
    validations:
      required: true
  - type: dropdown
    id: module
    attributes:
      label: Affected Module
      options:
        - POS
        - Inventory
        - Accounting
        - CRM
        - Workshop
        - HR
        - Reports
        - Auth
        - API
        - Platform
        - Other
    validations:
      required: true
  - type: dropdown
    id: priority
    attributes:
      label: Priority
      options:
        - P0 - Critical
        - P1 - High
        - P2 - Medium
        - P3 - Low
    validations:
      required: true
